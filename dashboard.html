<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Ogbmoso College of Nursing Science</title>
    <style>
        /* ================================================================
           OGBMOSO COLLEGE OF NURSING SCIENCE
           FOUNDATION OF NURSING PRESENTATION PORTAL
           DASHBOARD PAGE - PREMIUM STYLESHEET
           ================================================================ */

        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f4f7fc 0%, #e8edf4 100%);
            min-height: 100vh;
            padding: 20px;
            animation: fadeIn 0.8s ease-in-out;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        @keyframes glowBorder {
            0% { border-color: rgba(201, 168, 76, 0.2); }
            50% { border-color: rgba(201, 168, 76, 0.6); }
            100% { border-color: rgba(201, 168, 76, 0.2); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }

        /* ===== DASHBOARD CONTAINER ===== */
        .dashboard-container {
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 14px 30px;
            border-radius: 18px;
            box-shadow: 0 4px 30px rgba(10, 30, 51, 0.08);
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
            border-left: 5px solid #c9a84c;
            animation: slideDown 0.6s ease-out;
            transition: all 0.3s ease;
        }

        .navbar:hover {
            box-shadow: 0 8px 40px rgba(10, 30, 51, 0.12);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo img {
            max-height: 42px;
            width: auto;
            filter: drop-shadow(0 2px 8px rgba(10, 30, 51, 0.08));
        }

        .nav-school {
            font-size: 20px;
            font-weight: 900;
            color: #0a1e33;
            font-family: 'Times New Roman', Georgia, serif;
            letter-spacing: 1px;
        }

        .nav-school .gold {
            color: #c9a84c;
        }

        .nav-divider {
            color: #dce4ec;
            font-size: 22px;
            font-weight: 300;
        }

        .nav-title {
            color: #5a6a7e;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .nav-title .highlight {
            color: #c9a84c;
            font-weight: 700;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .nav-welcome {
            color: #1a3a5c;
            font-size: 14px;
            font-weight: 500;
            padding: 6px 16px;
            background: #f4f7fc;
            border-radius: 20px;
            border: 1px solid #e0e6ed;
        }

        .nav-welcome strong {
            color: #0a1e33;
            font-weight: 700;
        }

        .nav-welcome .emoji {
            margin-right: 4px;
        }

        .logout-btn {
            padding: 9px 24px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .logout-btn:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.35);
        }

        .logout-btn:active {
            transform: translateY(0);
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 4px 30px rgba(10, 30, 51, 0.06);
            min-height: 60vh;
            animation: slideUp 0.7s ease-out;
            border: 1px solid rgba(201, 168, 76, 0.08);
        }

        .main-content:hover {
            box-shadow: 0 8px 40px rgba(10, 30, 51, 0.08);
        }

        /* ===== PAGE HEADER ===== */
        .page-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f2f5;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 10px;
        }

        .page-header-left h1 {
            color: #0a1e33;
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .page-header-left h1 .gold {
            color: #c9a84c;
        }

        .page-header-left p {
            color: #5a6a7e;
            font-size: 15px;
            margin-top: 4px;
            font-weight: 400;
        }

        .page-header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            background: #f4f7fc;
            border-radius: 12px;
            border: 1px solid #e0e6ed;
        }

        .page-header-right .count {
            font-size: 14px;
            color: #5a6a7e;
        }

        .page-header-right .count strong {
            color: #0a1e33;
            font-size: 18px;
        }

        /* ===== GROUPS GRID ===== */
        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 28px;
        }

        /* ===== GROUP CARD ===== */
        .group-card {
            background: #f8fafc;
            border-radius: 18px;
            padding: 28px 25px 25px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            animation: slideUp 0.7s ease-out;
            animation-fill-mode: both;
        }

        .group-card:nth-child(1) { animation-delay: 0.1s; }
        .group-card:nth-child(2) { animation-delay: 0.2s; }
        .group-card:nth-child(3) { animation-delay: 0.3s; }

        .group-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(to right, #c9a84c, #0a1e33, #c9a84c);
            background-size: 200% auto;
            transform: scaleX(0);
            transition: transform 0.5s ease;
        }

        .group-card:hover::before {
            transform: scaleX(1);
            animation: shimmer 2s linear infinite;
        }

        .group-card:hover {
            transform: translateY(-8px) scale(1.01);
            border-color: #c9a84c;
            box-shadow: 0 20px 60px rgba(10, 30, 51, 0.12);
            background: white;
        }

        .group-card:active {
            transform: translateY(-4px) scale(0.99);
        }

        /* Card Badge */
        .group-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #0a1e33, #1a3a5c);
            color: #c9a84c;
            padding: 4px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 1.5px;
            margin-bottom: 14px;
            text-transform: uppercase;
        }

        .group-badge .icon {
            font-size: 16px;
        }

        /* Card Content */
        .group-card h3 {
            color: #0a1e33;
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }

        .group-topic {
            color: #1a3a5c;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 14px;
            padding: 4px 12px;
            background: rgba(201, 168, 76, 0.08);
            border-radius: 6px;
            display: inline-block;
        }

        .group-members {
            color: #5a6a7e;
            font-size: 14px;
            line-height: 1.8;
            margin-bottom: 16px;
        }

        .group-members strong {
            color: #0a1e33;
            font-weight: 700;
        }

        .group-members .member-count {
            display: inline-block;
            background: #e8edf4;
            color: #0a1e33;
            padding: 0 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            margin-left: 4px;
        }

        .group-card .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 4px;
        }

        .group-drive-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 11px 24px;
            background: linear-gradient(135deg, #0a1e33, #1a3a5c);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            letter-spacing: 0.3px;
        }

        .group-drive-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(10, 30, 51, 0.3);
            background: linear-gradient(135deg, #1a3a5c, #0a1e33);
        }

        .group-drive-btn .arrow {
            transition: transform 0.3s ease;
        }

        .group-drive-btn:hover .arrow {
            transform: translateX(4px);
        }

        .group-photo-count {
            color: #5a6a7e;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .group-photo-count .icon {
            font-size: 16px;
        }

        /* Card Decorative Elements */
        .group-card .card-number {
            position: absolute;
            top: 12px;
            right: 18px;
            font-size: 48px;
            font-weight: 900;
            color: rgba(10, 30, 51, 0.04);
            font-family: 'Times New Roman', Georgia, serif;
            pointer-events: none;
        }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: 28px;
            text-align: center;
            padding: 20px 30px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(201, 168, 76, 0.08);
        }

        .footer p {
            color: #5a6a7e;
            font-size: 13px;
            line-height: 1.8;
            letter-spacing: 0.3px;
        }

        .footer strong {
            color: #0a1e33;
            font-weight: 700;
        }

        .footer .gold-text {
            color: #c9a84c;
        }

        .footer .divider-dot {
            color: #c9a84c;
            opacity: 0.4;
            margin: 0 6px;
        }

        .footer .heart {
            color: #e74c3c;
            display: inline-block;
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .groups-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .navbar {
                padding: 12px 20px;
                border-radius: 14px;
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }

            .nav-left {
                justify-content: center;
                flex-wrap: wrap;
            }

            .nav-right {
                justify-content: center;
            }

            .nav-title {
                display: none;
            }

            .nav-divider {
                display: none;
            }

            .nav-school {
                font-size: 17px;
            }

            .main-content {
                padding: 22px 18px;
                border-radius: 16px;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .page-header-left h1 {
                font-size: 24px;
            }

            .groups-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .group-card {
                padding: 22px 18px;
            }

            .group-card h3 {
                font-size: 19px;
            }

            .group-card .card-number {
                font-size: 36px;
            }

            .footer p {
                font-size: 12px;
            }

            .nav-welcome {
                font-size: 13px;
                padding: 4px 12px;
            }

            .logout-btn {
                font-size: 13px;
                padding: 7px 18px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .navbar {
                padding: 10px 14px;
                border-radius: 12px;
                border-left-width: 4px;
            }

            .nav-logo img {
                max-height: 32px;
            }

            .nav-school {
                font-size: 14px;
            }

            .main-content {
                padding: 16px 12px;
                border-radius: 14px;
            }

            .page-header {
                margin-bottom: 18px;
                padding-bottom: 14px;
            }

            .page-header-left h1 {
                font-size: 20px;
            }

            .page-header-left p {
                font-size: 13px;
            }

            .page-header-right {
                padding: 4px 12px;
            }

            .page-header-right .count {
                font-size: 12px;
            }

            .group-card {
                padding: 18px 14px;
                border-radius: 14px;
            }

            .group-badge {
                font-size: 12px;
                padding: 3px 14px;
            }

            .group-card h3 {
                font-size: 17px;
            }

            .group-topic {
                font-size: 13px;
                padding: 3px 10px;
            }

            .group-members {
                font-size: 13px;
                line-height: 1.6;
            }

            .group-drive-btn {
                font-size: 13px;
                padding: 9px 18px;
                width: 100%;
                justify-content: center;
            }

            .group-card .card-number {
                font-size: 28px;
                top: 8px;
                right: 12px;
            }

            .footer {
                padding: 14px 16px;
                margin-top: 18px;
            }

            .footer p {
                font-size: 11px;
                line-height: 1.6;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="nav-left">
                <div class="nav-logo">
                    <img src="images/logo.png" alt="OCNS" onerror="this.style.display='none'" />
                    <span class="nav-school">OCNS <span class="gold">✦</span></span>
                </div>
                <span class="nav-divider">|</span>
                <span class="nav-title">Foundation of <span class="highlight">Nursing</span></span>
            </div>
            <div class="nav-right">
                <span class="nav-welcome">
                    <span class="emoji">👋</span> Welcome, <strong id="userMatric">NSG2024001</strong>
                </span>
                <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="main-content">
            <div class="page-header">
                <div class="page-header-left">
                    <h1>📋 Presentation <span class="gold">Groups</span></h1>
                    <p>Explore the presentations from each group — click a card to view details</p>
                </div>
                <div class="page-header-right">
                    <span class="count">🎯 <strong id="groupCount">3</strong> Groups</span>
                </div>
            </div>

            <div id="groupsContainer" class="groups-grid">
                <!-- Groups will be injected here by JavaScript -->
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>
                <strong>Designed &amp; Developed by:</strong> Gift <span class="gold-text">✦</span> 
                <strong>📞</strong> 2349164624021 
                <span class="divider-dot">|</span>
                <strong>Creative Direction:</strong> Jeconaih <span class="gold-text">✦</span> 
                <strong>📞</strong> 080XXXXXXXX 
                <span class="divider-dot">|</span>
                <span class="heart">❤️</span> Excellence in Nursing Education
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
